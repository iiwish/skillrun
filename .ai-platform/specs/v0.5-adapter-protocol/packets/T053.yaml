execution_constraints:
  allowed_files:
    - src/adapters/mod.rs
    - src/adapters/command.rs
    - src/runtime.rs
    - src/errors.rs
    - tests/runtime.rs
    - tests/errors.rs
    - tests/adapter_conformance.rs
    - tests/fixtures/**
    - .ai-platform/specs/v0.5-adapter-protocol/tasks.md
    - .ai-platform/evidence/T053/**
  forbidden_changes:
    - Shell-string execution.
    - Dependency installation.
    - Registry or package manager integration.
    - Broad Python/Node adapter rewrites unrelated to command dispatch.
  delegation: direct execute fallback is acceptable because the user asked to continue in this thread and the implementation scope is bounded to one adapter slice.
tdd_plan:
  red: Add command adapter runtime tests for success, stdout logging and protocol violation before implementation.
  green: Add minimal command adapter module and dispatch wiring.
  refactor: Extract shared process behavior only if tests force duplication that would be brittle.
validation_loop:
  commands:
    - cargo test --test runtime --test errors --test adapter_conformance
    - cargo test
    - cargo fmt --check
    - git diff --check
    - python D:\data\ai-rd-skill\ai-delivery-governor\scripts\validate_delivery_artifacts.py --root D:\data\skillrunv2 --task-id T053
  expected_signals:
    - Target runtime/error/conformance tests pass.
    - Full test suite remains green.
    - No formatting or whitespace errors.
    - Delivery artifact validator reports no blocking errors for T053.
  retry_budget: 2
evidence_contract:
