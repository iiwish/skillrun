review_contract:
  spec_compliance: Verify FR-050-003, FR-050-010, FR-050-011 and FR-050-012 with no shell execution or source metadata import.
  bug_quality: Verify missing output and malformed output stay ProtocolViolation and stdout/stderr remain logs.
  qa_acceptance: User review required before marking T053 Accepted.
handoff:
