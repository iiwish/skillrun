  goal: Add v0.4.2 positioning docs, official reference capsules, release docs, version bump and automated coverage.
  requirements:
    - FR-042-001
    - FR-042-002
    - FR-042-003
    - FR-042-004
    - FR-042-005
    - FR-042-006
    - FR-042-007
    - FR-042-008
