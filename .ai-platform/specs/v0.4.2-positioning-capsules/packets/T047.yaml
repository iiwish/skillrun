execution_constraints:
  allowed_files:
    - Cargo.toml
    - Cargo.lock
    - README.md
    - README.zh-CN.md
    - RELEASE_NOTES.md
    - docs/**
    - examples/commit_message_gate/**
    - examples/bounded_file_patcher/**
    - examples/readonly_diagnostics_runner/**
    - tests/**
    - .ai-platform/specs/v0.4.2-positioning-capsules/**
    - .ai-platform/evidence/T047/**
