  forbidden_changes:
    - Runtime architecture changes.
    - New language adapter implementation.
    - Registry, marketplace, install or sandbox claims.
  delegation: direct execute fallback because the user did not explicitly authorize subagents and the task is a bounded docs/examples slice.
tdd_plan:
  red: Add business example coverage for the v0.4.2 reference capsules.
  green: Add docs and capsules until targeted tests pass.
  refactor: Keep examples and docs scoped; update version expectations.
validation_loop:
  commands:
    - cargo fmt --check
    - git diff --check
    - cargo test --test business_examples
    - cargo test
    - cargo clippy --all-targets -- -D warnings
    - python D:\data\ai-rd-skill\ai-delivery-governor\scripts\validate_delivery_artifacts.py --root D:\data\skillrunv2 --task-id T047
evidence_contract:
  paths:
    - .ai-platform/evidence/T047/summary.md
    - .ai-platform/evidence/T047/test-results.md
    - .ai-platform/evidence/T047/diff.patch
review_contract:
  spec_compliance: Verify FR-042 and NFR-042 coverage.
  bug_quality: Verify tests, clippy and docs boundary claims.
  qa_acceptance: User review required before marking Accepted.
handoff:
  status_after_execution: Needs_Review
  merge_policy: User must explicitly approve merge/tag/publication.
stop_conditions:
  - Validation failure.
  - Runtime architecture scope drift.
  - User rejects trust model or official capsule positioning.
