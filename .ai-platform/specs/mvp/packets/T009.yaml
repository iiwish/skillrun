schema_version: 1
packet_id: EP-MVP-T009
task_id: T009
feature_id: mvp
mode: execute_one_task
adapter: codex

governance_inputs:
  constitution: .ai-platform/memory/constitution.md
  product_contract: .ai-platform/docs/product-design.md
  feature_spec: .ai-platform/specs/mvp/spec.md
  requirements_checklist: .ai-platform/docs/requirements-checklist.md
  test_strategy: .ai-platform/docs/test-strategy.md
  technical_decisions: .ai-platform/docs/technology-decision-record.md
  feature_plan: .ai-platform/specs/mvp/plan.md
  work_graph: .ai-platform/docs/tasks.md
  feature_task_index: .ai-platform/specs/mvp/tasks.md
  analysis: .ai-platform/specs/mvp/analysis.md
  approval_gates:
    constitution: Confirmed by user on 2026-05-11
    product_or_spec: Confirmed by user on 2026-05-11
    requirements_checklist: Completed
    technical_plan_and_work_graph: Confirmed after document review on 2026-05-11
    test_strategy: Confirmed after document review on 2026-05-11
    dependency_t003: Accepted after rereview on 2026-05-12
    dependency_t008: Accepted after rereview on 2026-05-12

work_unit:
  title: Implement Manifest-driven MCP Tool Exposure
  goal: Implement skillrun serve --mcp as a thin Manifest-driven MCP exposure path with dry-run contract verification.
  epic: E004 MCP And Pack
  story: US-004
  requirements:
    - FR-007
    - NFR-001
    - TDR-006
  priority: P1
  depends_on:
    - T003
    - T008
  blocks:
    - T011
  parallel: false
  conflicts_with:
    - T008
    - T010

codebase_context:
  local_instructions:
    - AGENTS.md
  relevant_files:
    - docs/mvp.md
    - .ai-platform/docs/test-strategy.md
    - .ai-platform/docs/technology-decision-record.md
    - src/cli.rs
    - src/consumer.rs
    - src/manifest.rs
    - src/inspect.rs
    - tests/consumer_guards.rs
  existing_patterns:
    - T008 centralized Consumer Mode guard in src/consumer.rs.
    - CLI parse_serve already recognizes --mcp, --cwd, and --dry-run.
    - inspect renders MCP tool name and description from Manifest.
    - Integration tests generate temp capsules and mutate action.py to prove Consumer Mode boundaries.
  interfaces_or_contracts:
    - serve --mcp --dry-run returns a machine-readable JSON contract derived from Manifest and SKILL.md.
    - The contract contains a tool name, tool description, input schema, output schema, output/error envelope result contract, and SKILL.md resource metadata/content.
    - serve --mcp uses Consumer Mode guard before building the contract and must not import action.py for metadata.
    - Non-dry-run MCP server mode may remain unimplemented in T009 if the dry-run contract is complete; the long-running server can be introduced later without changing Manifest mapping.
  forbidden_changes:
    - Do not implement .skr archive generation; T010 owns packaging.
    - Do not bypass or weaken Consumer Mode guard.
    - Do not re-import action.py in Consumer Mode for metadata.
    - Do not mark T009 Accepted.

execution_constraints:
  branch_or_worktree: current
  allowed_files:
    - Cargo.toml
    - README.md
    - README.zh-CN.md
    - src/main.rs
    - src/cli.rs
    - src/mcp.rs
    - src/manifest.rs
    - tests/mcp_server.rs
    - tests/consumer_guards.rs
  test_targets:
    - tests/mcp_server.rs
  ownership_notes:
    - tests/consumer_guards.rs may be updated only where T009 changes valid serve --mcp --dry-run from unimplemented to implemented.
    - README updates are allowed only to reflect T009 MCP dry-run status accurately.
    - Keep pack behavior untouched except existing guard fallback.

tdd_plan:
  required: true
  exception: null
  red:
    command: cargo test --test mcp_server
    expected_failure: Tests fail because serve --mcp --dry-run still returns unimplemented and no MCP contract builder exists.
  green:
    command: cargo test --test mcp_server
    expected_signal: dry-run JSON contract maps Manifest tool/schema/resource and stale Manifest fails closed.
  refactor:
    command: cargo test
    expected_signal: Full suite passes after updating existing guard expectation for valid serve dry-run.

validation_loop:
  commands:
    - cargo test --test mcp_server
    - cargo test
    - cargo run -- serve --mcp --cwd tmp/e2e-init/refund --dry-run
  retry_budget: 2
  failure_policy:
    first_failure: Fix issues directly related to Manifest-to-MCP mapping, Consumer Mode guard order, CLI parse_serve, or dry-run JSON shape.
    second_failure: Determine whether T009 scope needs to defer non-dry-run server mode or adjust packet boundaries.
    beyond_budget: Stop and record blocked evidence with command output.

evidence_contract:
  summary: .ai-platform/evidence/T009/summary.md
  diff: .ai-platform/evidence/T009/diff.patch
  test_results: .ai-platform/evidence/T009/test-results.md
  required:
    - changed files
    - RED/GREEN/REFACTOR results
    - validation results
    - diff summary
    - residual risks

review_contract:
  required_passes:
    - spec_compliance
    - bug_code_quality
    - qa_acceptance
  acceptance_rule: User explicit acceptance is required before marking T009 Accepted.
  review_focus:
    - input schema comes from Manifest.
    - SKILL.md is exposed as a resource.
    - action.py is not imported for metadata.
    - stale Manifest fails closed before contract generation.
    - T009 does not absorb T010 pack behavior.

handoff:
  external_issue: null
  pull_request: null
  finish_options:
    - keep current worktree for review
    - create commit only after user asks
    - discard work only with explicit confirmation

stop_conditions:
  - missing Rust toolchain or unavailable Cargo test environment
  - dirty worktree touching allowed files with unrelated changes
  - unclear MCP dry-run contract shape
  - missing approval gate
  - stale packet compared with work graph
  - unresolved Critical or High analysis finding
  - validation command unavailable
