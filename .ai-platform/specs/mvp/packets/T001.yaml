schema_version: 1
packet_id: EP-MVP-T001
task_id: T001
feature_id: mvp
mode: execute_one_task
adapter: codex

governance_inputs:
  constitution: .ai-platform/memory/constitution.md
  product_contract: .ai-platform/docs/product-design.md
  feature_spec: .ai-platform/specs/mvp/spec.md
  requirements_checklist: .ai-platform/docs/requirements-checklist.md
  test_strategy: .ai-platform/docs/test-strategy.md
  technical_decisions: .ai-platform/docs/technology-decision-record.md
  feature_plan: .ai-platform/specs/mvp/plan.md
  work_graph: .ai-platform/docs/tasks.md
  feature_task_index: .ai-platform/specs/mvp/tasks.md
  analysis: .ai-platform/specs/mvp/analysis.md
  approval_gates:
    constitution: Confirmed by user on 2026-05-11
    product_or_spec: Confirmed by user on 2026-05-11
    requirements_checklist: Completed
    technical_plan_and_work_graph: Confirmed after document review on 2026-05-11
    test_strategy: Confirmed after document review on 2026-05-11
    analysis: No unresolved Critical or High findings for T001

work_unit:
  title: Scaffold Rust Crate And CLI Entrypoint
  goal: Create the Rust crate skeleton, CLI entrypoint, project metadata and baseline integration test harness.
  epic: E001 Capsule And Manifest
  story: US-001
  requirements:
    - FR-001
    - NFR-006
    - TDR-005
  priority: P0
  depends_on: []
  blocks:
    - T002
    - T003
    - T005
    - T009
    - T010
    - T011
  parallel: false
  conflicts_with:
    - T002
    - T003
    - T005
    - T009
    - T010

codebase_context:
  local_instructions:
    - AGENTS.md
  relevant_files:
    - AGENTS.md
    - docs/mvp.md
    - docs/ssot.md
    - .ai-platform/docs/tasks.md
    - .ai-platform/docs/test-strategy.md
  existing_patterns:
    - The repository contains governance and product documents; T001 establishes the initial Rust Cargo binary crate.
    - Project documentation defaults to Chinese while crate names, commands, status names, and protocol terms remain English.
    - Use Cargo with binary name skillrun and Rust integration tests under tests.
  interfaces_or_contracts:
    - CLI must expose help text through cargo run -- --help.
    - CLI must expose version text through cargo run -- --version.
    - Cargo metadata must define package name skillrun and version 0.1.0.
    - README must state SkillRun is implemented in Rust and must not claim runtime commands beyond T001.
  forbidden_changes:
    - Do not implement init, manifest, inspect, runtime, MCP, pack, or adapter behavior in T001.
    - Do not rename the project or add a v2 suffix.
    - Do not create a Python package for SkillRun.
    - Do not mark any task Accepted.

execution_constraints:
  branch_or_worktree: current
  allowed_files:
    - Cargo.toml
    - Cargo.lock
    - README.md
    - src/main.rs
    - tests/cli.rs
  test_targets:
    - tests/cli.rs
  ownership_notes:
    - If any allowed file already contains unrelated user changes, stop and report before editing.
    - Preserve existing staged docs and do not revert unrelated user work.

tdd_plan:
  required: true
  exception: null
  red:
    command: cargo test --test cli
    expected_failure: Tests fail because Cargo.toml and the skillrun binary target do not exist yet.
  green:
    command: cargo test --test cli
    expected_signal: CLI help/version tests pass.
  refactor:
    command: cargo test --test cli && cargo run -- --help && cargo run -- --version
    expected_signal: Tests remain green and CLI help/version exit successfully.

validation_loop:
  commands:
    - cargo test --test cli
    - cargo run -- --help
    - cargo run -- --version
  retry_budget: 2
  failure_policy:
    first_failure: Fix issues directly related to Rust crate skeleton, CLI help, or test harness.
    second_failure: Determine whether Cargo metadata, binary target, or environment setup is blocking.
    beyond_budget: Stop and record blocked evidence with command output.

evidence_contract:
  summary: .ai-platform/evidence/T001/summary.md
  diff: .ai-platform/evidence/T001/diff.patch
  test_results: .ai-platform/evidence/T001/test-results.md
  required:
    - changed files
    - RED/GREEN/REFACTOR results
    - validation results
    - diff summary
    - residual risks

review_contract:
  required_passes:
    - spec_compliance
    - bug_code_quality
    - qa_acceptance
  acceptance_rule: User explicit acceptance is required before marking T001 Accepted.
  review_focus:
    - T001 must not implement runtime features beyond CLI skeleton.
    - README must not overclaim unsupported commands.
    - SkillRun implementation must be Rust, not Python.
    - Tests must fail before implementation and pass after minimal implementation.

handoff:
  external_issue: null
  pull_request: null
  finish_options:
    - keep branch or current worktree for follow-up
    - create commit only after user asks
    - discard work only with explicit confirmation

stop_conditions:
  - missing Rust toolchain or unavailable Cargo test environment
  - dirty worktree touching allowed files with unrelated changes
  - unclear allowed files
  - missing approval gate
  - stale packet compared with work graph
  - unresolved Critical or High analysis finding
  - validation command unavailable
