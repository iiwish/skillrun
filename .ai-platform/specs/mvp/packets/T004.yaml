schema_version: 1
packet_id: EP-MVP-T004
task_id: T004
feature_id: mvp
mode: execute_one_task
adapter: codex

governance_inputs:
  constitution: .ai-platform/memory/constitution.md
  product_contract: .ai-platform/docs/product-design.md
  feature_spec: .ai-platform/specs/mvp/spec.md
  requirements_checklist: .ai-platform/docs/requirements-checklist.md
  test_strategy: .ai-platform/docs/test-strategy.md
  technical_decisions: .ai-platform/docs/technology-decision-record.md
  feature_plan: .ai-platform/specs/mvp/plan.md
  work_graph: .ai-platform/docs/tasks.md
  feature_task_index: .ai-platform/specs/mvp/tasks.md
  analysis: .ai-platform/specs/mvp/analysis.md
  approval_gates:
    constitution: Confirmed by user on 2026-05-11
    product_or_spec: Confirmed by user on 2026-05-11
    requirements_checklist: Completed
    technical_plan_and_work_graph: Confirmed after document review on 2026-05-11
    test_strategy: Confirmed after document review on 2026-05-11
    dependency_t001: Accepted after rereview on 2026-05-11
    dependency_t003: Accepted after rereview on 2026-05-12

work_unit:
  title: Render Inspect Output And Instruction-only Status
  goal: Implement skillrun inspect for runnable capsules and instruction-only Skill directories.
  epic: E001 Capsule And Manifest
  story: US-002 and US-006
  requirements:
    - FR-003
    - FR-009
    - TDR-004
  priority: P1
  depends_on:
    - T001
    - T003
  blocks:
    - T008
    - T011
  parallel: false
  conflicts_with:
    - T003

codebase_context:
  local_instructions:
    - AGENTS.md
  relevant_files:
    - docs/mvp.md
    - docs/ssot.md
    - src/cli.rs
    - src/manifest.rs
    - tests/manifest.rs
  existing_patterns:
    - CLI dispatch lives in src/cli.rs.
    - Manifest generation writes YAML to .skillrun/manifest.generated.yaml.
    - Rust integration tests use CARGO_BIN_EXE_skillrun.
  interfaces_or_contracts:
    - skillrun inspect --cwd path/to/capsule prints a human-readable summary.
    - Runnable capsule inspect output includes skill name, SOP hash, schemas, adapter, permissions, examples, preflight status, and MCP summary.
    - Instruction-only directories print instruction-only status and do not become runnable capsules.
  forbidden_changes:
    - Do not implement stale Manifest guard beyond inspection messaging.
    - Do not implement runtime, MCP serving, pack, or run behavior in T004.
    - Do not mark T004 Accepted.

execution_constraints:
  branch_or_worktree: current
  allowed_files:
    - README.md
    - README.zh-CN.md
    - src/main.rs
    - src/cli.rs
    - src/inspect.rs
    - src/manifest.rs
    - tests/cli.rs
    - tests/inspect.rs
    - tests/fixtures/instruction_only/
  test_targets:
    - tests/inspect.rs
  ownership_notes:
    - README updates are allowed only to reflect inspect status accurately.
    - Keep Manifest generation behavior stable unless inspect needs a read helper.

tdd_plan:
  required: true
  exception: null
  red:
    command: cargo test --test inspect
    expected_failure: Tests fail because inspect command and renderer do not exist yet.
  green:
    command: cargo test --test inspect
    expected_signal: inspect prints runnable and instruction-only status.
  refactor:
    command: cargo test && cargo run -- inspect --cwd tmp/e2e-inspect/refund
    expected_signal: Full tests pass and a generated capsule can be inspected.

validation_loop:
  commands:
    - cargo test --test inspect
    - cargo test
    - cargo run -- init refund --python --output tmp/e2e-inspect
    - cargo run -- manifest --cwd tmp/e2e-inspect/refund
    - cargo run -- inspect --cwd tmp/e2e-inspect/refund
  retry_budget: 2
  failure_policy:
    first_failure: Fix issues directly related to inspect command parsing, Manifest loading, or instruction-only detection.
    second_failure: Determine whether T004 scope, YAML parsing, or fixture setup is blocking.
    beyond_budget: Stop and record blocked evidence with command output.

evidence_contract:
  summary: .ai-platform/evidence/T004/summary.md
  diff: .ai-platform/evidence/T004/diff.patch
  test_results: .ai-platform/evidence/T004/test-results.md
  required:
    - changed files
    - RED/GREEN/REFACTOR results
    - validation results
    - diff summary
    - residual risks

review_contract:
  required_passes:
    - spec_compliance
    - bug_code_quality
    - qa_acceptance
  acceptance_rule: User explicit acceptance is required before marking T004 Accepted.
  review_focus:
    - inspect does not execute business run.
    - output is understandable without reading Manifest directly.
    - instruction-only Skill remains non-executable.
    - T004 does not implement downstream runtime or MCP behavior.

handoff:
  external_issue: null
  pull_request: null
  finish_options:
    - keep branch or current worktree for follow-up
    - create commit only after user asks
    - discard work only with explicit confirmation

stop_conditions:
  - missing Rust toolchain or unavailable Cargo test environment
  - dirty worktree touching allowed files with unrelated changes
  - unclear allowed files
  - missing approval gate
  - stale packet compared with work graph
  - unresolved Critical or High analysis finding
  - validation command unavailable
