  spec_compliance:
    - "Protocol version is MCP 2025-11-25 or documented negotiated equivalent."
    - "stdout carries only JSON-RPC messages."
    - "Diagnostics go to stderr."
  bug_quality:
    - "No panic on invalid request shape."
    - "Child exits cleanly on stdin EOF."
handoff:
  next_task: "T015 or T016 after T014 is accepted."
  finish_state: "Needs_Review until validation and user acceptance."
stop_conditions:
