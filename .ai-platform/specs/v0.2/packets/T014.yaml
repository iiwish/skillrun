  green: "Implement minimal JSON-RPC line loop and initialize/capabilities response while keeping dry-run unchanged."
  refactor: "Extract response/error helpers in src/mcp.rs."
validation_loop:
  commands:
    - "cargo test --test mcp_server"
    - "cargo test --test cli"
    - "cargo test"
  expected_signals:
    - "Lifecycle tests pass."
    - "Dry-run tests still pass."
    - "Stale Manifest startup fails before server loop starts."
  failure_handling: "Fix lifecycle or CLI routing regressions only. Stop if tools/resources implementation becomes necessary beyond capability declaration."
evidence_contract:
  path: ".ai-platform/evidence/T014/"
  required:
