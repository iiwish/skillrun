#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that a GitHub Release with this tag is assumed to exist as a draft
# with the appropriate title/body, and will be undrafted for you.

name: Release
permissions:
  "contents": "write"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  pull_request:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@v6
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      - name: Wait for release-plz GitHub Release
        if: ${{ !github.event.pull_request }}
        shell: bash
        run: |
          for attempt in {1..30}; do
            if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          echo "::error title=GitHub Release not found::release-plz did not create ${{ github.ref_name }} before cargo-dist planning timed out"
          exit 1
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    # Only run if we're "publishing", and only if plan, local and global didn't fail (skipped is fine)
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Fetch artifacts from scratch-storage
      - name: Fetch artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          # Overwrite the previous copy
          name: artifacts-dist-manifest
          path: dist-manifest.json
      # Create a GitHub Release while uploading all files to it
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          # Keep the public release assets focused on installers, platform archives,
          # and the unified checksum file. The granular manifests and per-archive
          # checksum files are useful internally but noisy on the GitHub Release page.
          rm -f artifacts/*-dist-manifest.json
          rm -f artifacts/dist-manifest.json
          rm -f artifacts/*.sha256
          rm -f artifacts/source.tar.gz
          rm -f artifacts/source.tar.gz.sha256
      - name: Create GitHub Release
        env:
          PRERELEASE_FLAG: "${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          # If we're editing a release in place, we need to upload things ahead of time
          gh release upload "${{ needs.plan.outputs.tag }}" artifacts/* --clobber

          gh release edit "${{ needs.plan.outputs.tag }}" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --draft=false

  verify-release-assets:
    name: Verify release assets
    needs:
      - plan
      - host
    if: ${{ always() && needs.host.result == 'success' && needs.plan.outputs.publishing == 'true' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.plan.outputs.tag }}
    steps:
      - name: Verify release metadata and asset list
        shell: bash
        run: |
          set -euo pipefail
          release_json="$(gh release view "$RELEASE_TAG" --json tagName,isDraft,isPrerelease,assets)"

          actual_tag="$(jq -r '.tagName' <<<"$release_json")"
          if [[ "$actual_tag" != "$RELEASE_TAG" ]]; then
            echo "::error title=Release tag mismatch::expected $RELEASE_TAG, got $actual_tag"
            exit 1
          fi

          if [[ "$(jq -r '.isDraft' <<<"$release_json")" != "false" ]]; then
            echo "::error title=Release is still draft::$RELEASE_TAG must be public after cargo-dist upload"
            exit 1
          fi

          latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name')"
          if [[ "$latest_tag" != "$RELEASE_TAG" ]]; then
            echo "::error title=Latest release mismatch::expected $RELEASE_TAG, got $latest_tag"
            exit 1
          fi

          jq -r '.assets[].name' <<<"$release_json" | sort > actual-assets.txt
          cat > expected-assets.txt <<'EOF'
          sha256.sum
          skillrun-aarch64-apple-darwin.tar.xz
          skillrun-aarch64-unknown-linux-gnu.tar.xz
          skillrun-installer.ps1
          skillrun-installer.sh
          skillrun-x86_64-apple-darwin.tar.xz
          skillrun-x86_64-pc-windows-msvc.zip
          skillrun-x86_64-unknown-linux-gnu.tar.xz
          EOF
          sed -i 's/^          //' expected-assets.txt
          sort -o expected-assets.txt expected-assets.txt
          diff -u expected-assets.txt actual-assets.txt

      - name: Verify checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release-verify"
          gh release download "$RELEASE_TAG" --pattern sha256.sum --dir "$RUNNER_TEMP/release-verify"

          awk 'NF { print $2 }' "$RUNNER_TEMP/release-verify/sha256.sum" | sed 's/^\*//' | sort > checksum-assets.txt
          cat > expected-checksum-assets.txt <<'EOF'
          skillrun-aarch64-apple-darwin.tar.xz
          skillrun-aarch64-unknown-linux-gnu.tar.xz
          skillrun-x86_64-apple-darwin.tar.xz
          skillrun-x86_64-pc-windows-msvc.zip
          skillrun-x86_64-unknown-linux-gnu.tar.xz
          EOF
          sed -i 's/^          //' expected-checksum-assets.txt
          sort -o expected-checksum-assets.txt expected-checksum-assets.txt
          diff -u expected-checksum-assets.txt checksum-assets.txt

      - name: Smoke shell installer
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/installer"
          gh release download "$RELEASE_TAG" --pattern skillrun-installer.sh --dir "$RUNNER_TEMP/installer"

          export CARGO_HOME="$RUNNER_TEMP/skillrun-cargo-home"
          export SKILLRUN_NO_MODIFY_PATH=1
          sh "$RUNNER_TEMP/installer/skillrun-installer.sh" --quiet

          expected_version="${RELEASE_TAG#v}"
          installed="$CARGO_HOME/bin/skillrun"
          version="$("$installed" --version)"
          if [[ "$version" != "skillrun $expected_version" ]]; then
            echo "::error title=Installer version mismatch::expected skillrun $expected_version, got $version"
            exit 1
          fi
          "$installed" host status --json | grep -Eq '"ok"[[:space:]]*:[[:space:]]*true'

  verify-release-archives:
    name: Smoke release archive (${{ matrix.asset }})
    needs:
      - plan
      - host
    if: ${{ always() && needs.host.result == 'success' && needs.plan.outputs.publishing == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-22.04"
            asset: "skillrun-x86_64-unknown-linux-gnu.tar.xz"
            binary: "skillrun"
          - os: "macos-13"
            asset: "skillrun-x86_64-apple-darwin.tar.xz"
            binary: "skillrun"
          - os: "windows-latest"
            asset: "skillrun-x86_64-pc-windows-msvc.zip"
            binary: "skillrun.exe"
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.plan.outputs.tag }}
      RELEASE_ASSET: ${{ matrix.asset }}
      RELEASE_BINARY: ${{ matrix.binary }}
    steps:
      - name: Download and run release archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release-smoke" "$RUNNER_TEMP/release-smoke/extract"
          gh release download "$RELEASE_TAG" --pattern "$RELEASE_ASSET" --dir "$RUNNER_TEMP/release-smoke"

          case "$RELEASE_ASSET" in
            *.zip)
              7z x "$RUNNER_TEMP/release-smoke/$RELEASE_ASSET" -o"$RUNNER_TEMP/release-smoke/extract" >/dev/null
              ;;
            *.tar.xz)
              tar -xJf "$RUNNER_TEMP/release-smoke/$RELEASE_ASSET" -C "$RUNNER_TEMP/release-smoke/extract"
              ;;
            *)
              echo "::error title=Unsupported release archive::$RELEASE_ASSET"
              exit 1
              ;;
          esac

          binary_path="$(find "$RUNNER_TEMP/release-smoke/extract" -type f -name "$RELEASE_BINARY" | head -n 1)"
          if [[ -z "$binary_path" ]]; then
            echo "::error title=Release binary missing::$RELEASE_BINARY not found in $RELEASE_ASSET"
            exit 1
          fi
          chmod +x "$binary_path" || true

          expected_version="${RELEASE_TAG#v}"
          version="$("$binary_path" --version)"
          if [[ "$version" != "skillrun $expected_version" ]]; then
            echo "::error title=Archive version mismatch::expected skillrun $expected_version, got $version"
            exit 1
          fi
          "$binary_path" host status --json | grep -Eq '"ok"[[:space:]]*:[[:space:]]*true'

  announce:
    needs:
      - plan
      - host
      - verify-release-assets
      - verify-release-archives
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' && needs.verify-release-assets.result == 'success' && needs.verify-release-archives.result == 'success' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
