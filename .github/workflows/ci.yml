name: Rust CI

on:
  push:
    branches:
      - main
      - "codex/**"
      - "release/**"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: python -m pip install "pydantic>=2,<3"
      - name: Run cargo test
        shell: bash
        run: |
          set +e
          cargo test 2>&1 | tee cargo-test.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            tail -n 50 cargo-test.log | sed -E 's/\x1B\[[0-9;]*[mK]//g; s/%/%25/g; s/\r/%0D/g; s/$/%0A/' | {
              message=""
              while IFS= read -r line; do
                message="${message}${line}"
              done
              echo "::error title=cargo test failed::${message}"
            }
            exit "$status"
          fi
