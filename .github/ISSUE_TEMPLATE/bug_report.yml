name: Bug report
description: Report a reproducible SkillRun bug
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve SkillRun. Please do not use public issues for security vulnerabilities; follow SECURITY.md instead.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Output of `skillrun --version`, Git tag, or commit SHA.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include commands, capsule layout, input JSON, and observed output when possible.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, Python version if an action adapter is involved.
